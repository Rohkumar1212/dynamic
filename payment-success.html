<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>
    <script defer src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-500 flex justify-center items-center h-screen">
    <div id="main-card" style="text-align:center; margin-top:50px; font-family: sans-serif;">
        <div id="processing-ui">
            <h2>Processing your order...</h2>
            <p>Please wait while we update your account.</p>
        </div>

        <p id="message" style="color: red; font-weight: bold;"></p>
    </div>
    <script>
    /* ============================================================
        FINALIZE ORDER: Called only after successful payment return
    ============================================================ */
        async function finalizePaymentOrder() {
            const messageEl = document.getElementById("message");
            const mainCardEl = document.getElementById("main-card");

            const token = localStorage.getItem("token") || localStorage.getItem("userguest");
            const pendingData = JSON.parse(sessionStorage.getItem("pendingOrder"));

            if (!pendingData || !token) {
                if (messageEl) messageEl.innerText = "Order data not found. If payment was deducted, contact support.";
                return;
            }

            try {
                // Post the structured data to your /api/checkout
                const response = await fetch("https://admin.dynamiccorrugations.com/api/checkout", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        customerFullName: pendingData.customerFullName,
                        customerEmail: pendingData.customerEmail,
                        customerMobile: pendingData.customerMobile,
                        shippingAddress: pendingData.shippingAddress,
                        billing: pendingData.billing,
                        paymentMethod: "payu",
                        paymentStatus: "success", // We know it's success because we are on this page
                        gstRate: pendingData.gstRate
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    // Clear cache only after API success
                    sessionStorage.removeItem("pendingOrder");

                    if (mainCardEl) {
                        mainCardEl.innerHTML = `
                    <div class="bg-white p-8 rounded shadow-lg border-t-8 border-green-500 text-center">
                        <h2 class="text-2xl font-bold text-green-700">Order Placed Successfully!</h2>
                        <p class="mt-2 text-gray-600">Order ID: <b>${result.data?.orderCode || 'Confirmed'}</b></p>
                        <a href="/index.html" class="mt-4 inline-block bg-orange-500 text-white px-6 py-2 rounded">Home</a>
                    </div>
                `;
                    }
                } else {
                    throw new Error(result.message || "Failed to register order.");
                }
            } catch (error) {
                console.error("Finalization Error:", error);
                if (messageEl) messageEl.innerText = "Payment received, but order recording failed. Please contact us.";
            }
        }

        window.onload = finalizePaymentOrder;
    </script>
</body>

</html>
