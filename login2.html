<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 250px;
            object-fit: cover;
        }

        .card {
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5">
        <h2 class="text-center mb-4">Product Gallery</h2>
        <div class="row" id="gallery-container">
            <div class="text-center">Loading gallery...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://admin.dynamiccorrugations.com/api/gallery';
        const BASE_IMAGE_URL = 'https://admin.dynamiccorrugations.com';

        async function fetchGallery() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.success) {
                    displayImages(result.data);
                } else {
                    document.getElementById('gallery-container').innerHTML = '<p class="text-danger">Failed to load images.</p>';
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('gallery-container').innerHTML = '<p class="text-danger">Error connecting to API.</p>';
            }
        }

        function displayImages(items) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = ''; // Clear loading text

            items.forEach(item => {
                const cardHtml = `
                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <img src="${BASE_IMAGE_URL}/${item.image.url}" 
                                 class="card-img-top" 
                                 alt="${item.image.alt}">
                            <div class="card-body">
                                <h6 class="card-title text-truncate">${item.title}</h6>
                                <p class="card-text text-muted small">${item.category}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // Initialize the fetch
        fetchGallery();
    </script>
</body>

</html>
